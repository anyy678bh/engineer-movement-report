<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Password Reset | Engineer Movement Report</title>
    <link rel="stylesheet" href="styles.css?v=20260713" />
  </head>
  <body>
    <header class="hero">
      <div class="hero-row">
        <div>
          <p class="eyebrow">Account recovery</p>
          <h1>Password reset</h1>
          <p class="subtitle">Use this page to request a reset link or complete a password reset with a valid token.</p>
        </div>
        <div class="hero-actions">
          <a class="auth-link" href="login.html">Login</a>
          <a class="auth-link" href="register.html">Register</a>
        </div>
      </div>
    </header>

    <main class="layout single-column">
      <section class="card">
        <div class="card-header">
          <div>
            <p class="section-kicker">Reset your password</p>
            <h2>Secure account recovery</h2>
          </div>
          <span class="pill subtle">Password reset</span>
        </div>

        <form id="passwordResetForm" class="query-form">
          <div class="query-row" id="resetRequestSection">
            <label>
              Email address
              <input type="email" id="resetEmail" placeholder="you@company.com" required />
            </label>
          </div>

          <div class="query-row hidden" id="resetConfirmSection">
            <label>
              New password
              <input type="password" id="resetPassword" placeholder="New password" required />
            </label>
            <label>
              Confirm password
              <input type="password" id="resetConfirmPassword" placeholder="Confirm password" required />
            </label>
          </div>

          <div class="query-actions">
            <button type="submit" id="passwordResetSubmit">Send reset link</button>
            <a class="ghost" id="cancelResetLink" href="login.html">Back to login</a>
          </div>
        </form>

        <p id="passwordResetMessage" class="status" aria-live="polite"></p>
      </section>
    </main>

    <script src="config.js?v=20260713"></script>
    <script src="app.js?v=20260713"></script>
  </body>
</html>
