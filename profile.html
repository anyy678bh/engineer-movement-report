<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile | Engineer Movement Report</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="hero">
      <div class="hero-row">
        <div>
          <p class="eyebrow">Multi-tenant field service reporting</p>
          <h1>User profile</h1>
          <p class="subtitle">Manage your account details and access your engineer workspace.</p>
        </div>
        <div class="hero-actions">
          <a class="auth-link" href="index.html">Reports</a>
          <a class="auth-link" href="login.html">Login</a>
        </div>
      </div>
    </header>

    <main class="profile-shell">
      <section class="profile-card">
        <div class="profile-header">
          <div class="avatar">AU</div>
          <div>
            <h2 id="profileName">User Name</h2>
            <p id="profileEmail" class="muted">user@company.com</p>
          </div>
        </div>

                <div class="profile-details">
          <p><strong>Full name</strong><br /><span id="profileFullName">—</span></p>
          <p><strong>Department</strong><br /><span id="profileDepartment" class="muted">—</span></p>
          <p><strong>ID card number</strong><br /><span id="profileIdCard" class="muted">—</span></p>
          <p><strong>Email address</strong><br /><span id="profileEmailDisplay" class="muted">—</span></p>
        </div>

        <div class="profile-actions">
          <a class="auth-link secondary" href="edit-profile.html">Edit profile</a>
          <button type="button" id="resetPasswordBtn" class="ghost">Reset Password</button>
          <button type="button" id="logoutBtn">Logout</button>
        </div>

        <p id="profileMessage" class="status" aria-live="polite"></p>
      </section>
    </main>

    <script>
      (function () {
        const profile = JSON.parse(localStorage.getItem('engineer-user-profile') || '{}');
        const session = JSON.parse(localStorage.getItem('engineer-user-session') || 'null');
        const displayName = profile.fullName || (session && session.name) || 'Engineer User';
        const displayEmail = profile.emailAddress || (session && session.email) || 'user@company.com';
        const setText = (id, value) => {
          const el = document.getElementById(id);
          if (el) el.textContent = value;
        };

        setText('profileName', displayName);
        setText('profileEmail', displayEmail);
        setText('profileFullName', profile.fullName || '—');
        setText('profileDepartment', profile.department || '—');
        setText('profileIdCard', profile.idCardNumber || '—');
        setText('profileEmailDisplay', profile.emailAddress || displayEmail);

        const debugEl = document.getElementById('profileDebug');
        if (debugEl) {
          debugEl.textContent = JSON.stringify(profile, null, 2) || 'No stored profile data.';
        }
      })();
    </script>
    <script src="config.js?v=20260713"></script>
    <script src="app.js?v=20260713"></script>
  </body>
</html>
