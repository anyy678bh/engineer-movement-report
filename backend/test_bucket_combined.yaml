AWSTemplateFormatVersion: '2010-09-09'
Description: S3 bucket with all three properties combined
Resources:
  UserProfileImagesBucket:
    Type: AWS::S3::Bucket
    Properties:
      OwnershipControls:
        Rules:
        - ObjectOwnership: BucketOwnerEnforced
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      CorsConfiguration:
        CorsRules:
        - AllowedMethods:
          - GET
          - PUT
          - POST
          - HEAD
          AllowedOrigins:
          - localhost:3000
          - localhost:8000
          - http://localhost:3000
          - http://localhost:8000
          - 'https://*.amplifyapp.com'
          AllowedHeaders:
          - '*'
