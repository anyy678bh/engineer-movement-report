AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Engineer Movement Report backend using Lambda, API Gateway, DynamoDB, and Cognito

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 30

Resources:
  ReportsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: engineer-movement-reports
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE

  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: engineer-movement-report-users
      AutoVerifiedAttributes:
        - email
      UsernameAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
          RequireUppercase: true

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: engineer-movement-report-client
      UserPoolId: !Ref UserPool
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH

  CreateReportFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambda/createReport/
      Handler: index.handler
      Environment:
        Variables:
          REPORTS_TABLE: !Ref ReportsTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ReportsTable
      Events:
        CreateReportApi:
          Type: Api
          Properties:
            Path: /reports
            Method: post

  ListReportsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambda/listReports/
      Handler: index.handler
      Environment:
        Variables:
          REPORTS_TABLE: !Ref ReportsTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ReportsTable
      Events:
        ListReportsApi:
          Type: Api
          Properties:
            Path: /reports
            Method: get

Outputs:
  UserPoolId:
    Value: !Ref UserPool
  UserPoolClientId:
    Value: !Ref UserPoolClient
  ApiEndpoint:
    Value: !Sub https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod
