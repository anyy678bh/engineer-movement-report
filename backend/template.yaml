AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Engineer Movement Report backend using Lambda, API Gateway, DynamoDB, and Cognito

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 30

Parameters:
  MongoDbUri:
    Type: String
    Default: ''
    NoEcho: true
    Description: Optional MongoDB connection string for Lambda persistence.

  MongoDbName:
    Type: String
    Default: engineer-movement-report
    Description: MongoDB database name used by the Lambda handlers.

Resources:
  ReportsApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: Prod
      EndpointConfiguration: REGIONAL
      Cors: "'*'"

  ReportsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: engineer-movement-reports
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE

  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: engineer-movement-report-users
      AutoVerifiedAttributes:
        - email
      UsernameAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
          RequireUppercase: true

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: engineer-movement-report-client
      UserPoolId: !Ref UserPool
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH

  CreateReportFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambda/createReport/
      Handler: index.handler
      Environment:
        Variables:
          REPORTS_TABLE: !Ref ReportsTable
          MONGODB_URI: !Ref MongoDbUri
          MONGODB_DB: !Ref MongoDbName
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ReportsTable
      Events:
        CreateReportApi:
          Type: Api
          Properties:
            RestApiId: !Ref ReportsApi
            Path: /reports
            Method: post
        DeleteReportApi:
          Type: Api
          Properties:
            RestApiId: !Ref ReportsApi
            Path: /reports
            Method: delete

  UserProfilesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: engineer-user-profiles
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: tenantId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: tenantId
          KeyType: RANGE

  UserProfileImagesBucket:
    Type: AWS::S3::Bucket
    Properties:
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders:
              - "*"
            AllowedMethods:
              - GET
              - PUT
              - POST
              - HEAD
            AllowedOrigins:
              - "http://localhost:8000"
              - "https://d369y0ycnp7jn3.amplifyapp.com"

  ProfileFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: profile-lambda/
      Handler: index.handler
      Environment:
        Variables:
          USER_PROFILES_TABLE: !Ref UserProfilesTable
          PROFILE_IMAGES_BUCKET: !Ref UserProfileImagesBucket
          MONGODB_URI: !Ref MongoDbUri
          MONGODB_DB: !Ref MongoDbName
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UserProfilesTable
        - S3CrudPolicy:
            BucketName: !Ref UserProfileImagesBucket
      Events:
        ProfileApi:
          Type: Api
          Properties:
            RestApiId: !Ref ReportsApi
            Path: /profile
            Method: any
        ProfileImageUploadApi:
          Type: Api
          Properties:
            RestApiId: !Ref ReportsApi
            Path: /profile/image-upload
            Method: any
        ProfileImageRemoveApi:
          Type: Api
          Properties:
            RestApiId: !Ref ReportsApi
            Path: /profile/image-remove
            Method: any

  ListReportsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambda/listReports/
      Handler: index.handler
      Environment:
        Variables:
          REPORTS_TABLE: !Ref ReportsTable
          MONGODB_URI: !Ref MongoDbUri
          MONGODB_DB: !Ref MongoDbName
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ReportsTable
      Events:
        ListReportsApi:
          Type: Api
          Properties:
            RestApiId: !Ref ReportsApi
            Path: /reports
            Method: get

Outputs:
  UserPoolId:
    Value: !Ref UserPool
  UserPoolClientId:
    Value: !Ref UserPoolClient
  ApiEndpoint:
    Value: !Sub https://${ReportsApi}.execute-api.${AWS::Region}.amazonaws.com/Prod
