AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Engineer Movement Report backend using Lambda, API Gateway, DynamoDB,
  and Cognito
Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 30
Resources:
  ReportsApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: Prod
      Cors:
        AllowMethods: '''OPTIONS,GET,POST'''
        AllowHeaders: '''Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'''
        AllowOrigin: '''*'''
  ReportsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: engineer-movement-reports
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: pk
        AttributeType: S
      - AttributeName: sk
        AttributeType: S
      KeySchema:
      - AttributeName: pk
        KeyType: HASH
      - AttributeName: sk
        KeyType: RANGE
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: engineer-movement-report-users
      AutoVerifiedAttributes:
      - email
      UsernameAttributes:
      - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
          RequireUppercase: true
  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: engineer-movement-report-client
      UserPoolId:
        Ref: UserPool
      ExplicitAuthFlows:
      - ALLOW_USER_PASSWORD_AUTH
      - ALLOW_REFRESH_TOKEN_AUTH
  CreateReportFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: CreateReportFunction
      Handler: index.handler
      Environment:
        Variables:
          REPORTS_TABLE:
            Ref: ReportsTable
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: ReportsTable
      Events:
        CreateReportApi:
          Type: Api
          Properties:
            RestApiId:
              Ref: ReportsApi
            Path: /reports
            Method: post
    Metadata:
      SamResourceId: CreateReportFunction
  UserProfilesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: engineer-user-profiles
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: userId
        AttributeType: S
      - AttributeName: tenantId
        AttributeType: S
      KeySchema:
      - AttributeName: userId
        KeyType: HASH
      - AttributeName: tenantId
        KeyType: RANGE
  UserProfileImagesBucket:
    Type: AWS::S3::Bucket
    Properties:
      AccessControl: PublicRead
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      CorsConfiguration:
        CorsRules:
        - AllowedHeaders:
          - '*'
          AllowedMethods:
          - GET
          - PUT
          - POST
          - HEAD
          - OPTIONS
          AllowedOrigins:
          - http://127.0.0.1:8000
          - http://localhost:8000
          - http://localhost
          MaxAge: 3000
  ProfileFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ProfileFunction
      Handler: index.handler
      Environment:
        Variables:
          USER_PROFILES_TABLE:
            Ref: UserProfilesTable
          PROFILE_IMAGES_BUCKET:
            Ref: UserProfileImagesBucket
          AWS_REGION:
            Ref: AWS::Region
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: UserProfilesTable
      - S3CrudPolicy:
          BucketName:
            Ref: UserProfileImagesBucket
      Events:
        ProfileApi:
          Type: Api
          Properties:
            RestApiId:
              Ref: ReportsApi
            Path: /profile
            Method: any
        ProfileImageUploadApi:
          Type: Api
          Properties:
            RestApiId:
              Ref: ReportsApi
            Path: /profile/image-upload
            Method: any
        ProfileImageRemoveApi:
          Type: Api
          Properties:
            RestApiId:
              Ref: ReportsApi
            Path: /profile/image-remove
            Method: any
    Metadata:
      SamResourceId: ProfileFunction
  ListReportsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ListReportsFunction
      Handler: index.handler
      Environment:
        Variables:
          REPORTS_TABLE:
            Ref: ReportsTable
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: ReportsTable
      Events:
        ListReportsApi:
          Type: Api
          Properties:
            RestApiId:
              Ref: ReportsApi
            Path: /reports
            Method: get
    Metadata:
      SamResourceId: ListReportsFunction
Outputs:
  UserPoolId:
    Value:
      Ref: UserPool
  UserPoolClientId:
    Value:
      Ref: UserPoolClient
  ApiEndpoint:
    Value:
      Fn::Sub: https://${ReportsApi}.execute-api.${AWS::Region}.amazonaws.com/Prod
